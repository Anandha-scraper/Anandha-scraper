    <text x="31" y="16" class="label" fill="#007ACC" text-anchor="middle" filter="url(#glow)">VS Code</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.1s" fill="freeze"/>
  </g>

