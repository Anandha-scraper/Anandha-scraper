<svg width="900" height="80" viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      .label {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-weight: 700;
        font-size: 12px;
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="80" class="bg"/>

  <!-- JavaScript -->
  <g transform="translate(30,12)">
    <rect width="72" height="24" rx="4" fill="#F7DF1E20" stroke="#F7DF1E" stroke-width="1"/>
    <text x="36" y="16" class="label" fill="#F7DF1E" text-anchor="middle" filter="url(#glow)">JavaScript</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0s" fill="freeze"/>
  </g>

  <!-- TypeScript -->
  <g transform="translate(115,12)">
    <rect width="72" height="24" rx="4" fill="#3178C620" stroke="#3178C6" stroke-width="1"/>
    <text x="36" y="16" class="label" fill="#3178C6" text-anchor="middle" filter="url(#glow)">TypeScript</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.15s" fill="freeze"/>
  </g>

  <!-- React -->
  <g transform="translate(200,12)">
    <rect width="62" height="24" rx="4" fill="#61DAFB20" stroke="#61DAFB" stroke-width="1"/>
    <text x="31" y="16" class="label" fill="#61DAFB" text-anchor="middle" filter="url(#glow)">React</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
  </g>

  <!-- Next.js -->
  <g transform="translate(275,12)">
    <rect width="62" height="24" rx="4" fill="#ffffff20" stroke="#ffffff88" stroke-width="1"/>
    <text x="31" y="16" class="label" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Next.js</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.45s" fill="freeze"/>
  </g>

  <!-- Node.js -->
  <g transform="translate(350,12)">
    <rect width="62" height="24" rx="4" fill="#3C873A20" stroke="#3C873A" stroke-width="1"/>
    <text x="31" y="16" class="label" fill="#3C873A" text-anchor="middle" filter="url(#glow)">Node.js</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
  </g>

  <!-- MongoDB -->
  <g transform="translate(425,12)">
    <rect width="70" height="24" rx="4" fill="#47A24820" stroke="#47A248" stroke-width="1"/>
    <text x="35" y="16" class="label" fill="#47A248" text-anchor="middle" filter="url(#glow)">MongoDB</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.75s" fill="freeze"/>
  </g>

