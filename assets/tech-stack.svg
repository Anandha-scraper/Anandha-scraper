  <g transform="translate(326,48)">
    <rect width="72" height="24" rx="4" fill="#00D4FF20" stroke="#00D4FF" stroke-width="1"/>
    <text x="36" y="16" class="label" fill="#00D4FF" text-anchor="middle" filter="url(#glow)">Hyprland</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.25s" fill="freeze"/>
  </g>

