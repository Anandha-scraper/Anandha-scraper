    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.65s" fill="freeze"/>
  </g>

  <!-- Express -->
  <g transform="translate(119,48)">
    <rect width="64" height="24" rx="4" fill="#ffffff10" stroke="#ffffff66" stroke-width="1"/>
    <text x="32" y="16" class="label" fill="#aaaaaa" text-anchor="middle" filter="url(#glow)">Express.js</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.8s" fill="freeze"/>
  </g>

  <!-- Git -->
  <g transform="translate(196,48)">
    <rect width="42" height="24" rx="4" fill="#F0503220" stroke="#F05032" stroke-width="1"/>
    <text x="21" y="16" class="label" fill="#F05032" text-anchor="middle" filter="url(#glow)">Git</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.95s" fill="freeze"/>
  </g>

