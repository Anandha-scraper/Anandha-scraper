  <g transform="translate(504,48)">
    <rect width="48" height="24" rx="4" fill="#a78bfa20" stroke="#a78bfa" stroke-width="1"/>
    <text x="24" y="16" class="label" fill="#a78bfa" text-anchor="middle" filter="url(#glow)">LLMs</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.55s" fill="freeze"/>
  </g>

  <!-- SaaS -->
  <g transform="translate(565,48)">
    <rect width="46" height="24" rx="4" fill="#F7DF1E20" stroke="#F7DF1E88" stroke-width="1"/>
    <text x="23" y="16" class="label" fill="#F7DF1E" text-anchor="middle" filter="url(#glow)">SaaS</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.7s" fill="freeze"/>
